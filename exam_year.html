<!DOCTYPE html>
<html>
<head>
    <title>{{ dept }} - Select Year</title>
</head>
<body>

<h1>{{ dept }} Department</h1>
<h2>Select Year</h2>

        Year {{ year }}

{% endfor %}

<a href="/exam">⬅ Back</a>

</body>
</html>
