<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Notice</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', sans-serif;
    }
    .edit-card {
      max-width: 750px;
      margin: 60px auto;
      padding: 30px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    }
    .edit-card h2 {
      margin-bottom: 25px;
      font-weight: 600;
      color: #343a40;
    }
    .form-label {
      font-weight: 500;
    }
    .current-file {
      font-size: 0.9rem;
      color: #6c757d;
    }
    .btn-back {
      margin-left: 10px;
    }
    .btn-primary:hover {
      background-color: #0b5ed7;
      border-color: #0b5ed7;
    }
  </style>
</head>
<body>
  <div class="container edit-card">
    <h2>Edit Notice</h2>
    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label" for="title">Title</label>
        <input class="form-control" id="title" name="title" value="{{ notice['title'] }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="content">Content</label>
        <textarea class="form-control" id="content" name="content" rows="5" required>{{ notice['content'] }}</textarea>
      </div>
      <div class="mb-3">
        <label class="form-label" for="category">Category</label>
        <input class="form-control" id="category" name="category" value="{{ notice['category'] }}">
      </div>
      <div class="mb-3">
        <label class="form-label" for="priority">Priority</label>
        <input class="form-control" id="priority" name="priority" value="{{ notice['priority'] }}">
      </div>
      <div class="mb-3">
        <label class="form-label" for="file">Upload File</label>
        <input class="form-control" type="file" id="file" name="file">
        {% if notice['filename'] %}
        <p class="current-file mt-2">
          Current File: 
          <a href="{{ url_for('uploaded_file', filename=notice['filename']) }}" target="_blank">{{ notice['filename'] }}</a>
        </p>
        {% endif %}
      </div>
      <button type="submit" class="btn btn-primary">Update Notice</button>
      <a href="{{ request.referrer or url_for('home_page') }}" class="btn btn-secondary btn-back">Cancel</a>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
