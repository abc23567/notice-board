<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ dept }} - Select Year</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4 text-center">{{ dept }} - Select Year</h2>
    <div class="row">
        {% for year in years %}
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('exam_notices', dept=dept, year=year) }}" class="btn btn-outline-success w-100">{{ year }}</a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
