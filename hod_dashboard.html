<!DOCTYPE html>
<html>
<head>
    <title>{{ dept }} HOD Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {margin:0;padding:0;background: url('{{ url_for("static", filename="college_bg.jpg") }}') no-repeat center center fixed;background-size:cover;font-family:Arial,sans-serif;}
        .overlay {background:rgba(0,0,0,0.6);min-height:100vh;padding:20px;color:white;}
        .top-header {text-align:center;font-size:28px;font-weight:bold;color:#ffd700;text-shadow:0 0 10px #fff;}
        .add-btn {background:linear-gradient(45deg,#4e73df,#1cc88a);padding:10px 20px;border:none;border-radius:10px;color:white;cursor:pointer;margin:20px auto;display:block;font-size:16px;}
        .add-btn:hover {transform:scale(1.05);box-shadow:0 0 10px #1cc88a,0 0 20px #4e73df;}
        .notice-form {display:none;flex-direction:column;gap:15px;max-width:500px;margin:10px auto;background:rgba(255,255,255,0.2);padding:20px;border-radius:15px;backdrop-filter:blur(10px);}
        .notice-form input,.notice-form textarea,.notice-form select {padding:10px;border-radius:10px;border:none;font-size:16px;}
        .notice-form button {padding:10px;border-radius:10px;border:none;background:linear-gradient(45deg,#1cc88a,#4e73df);color:white;font-weight:bold;cursor:pointer;}
        .notice-board{display:flex;flex-direction:column;gap:20px;max-width:800px;margin:30px auto;}
        .notice-card{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);padding:20px;border-radius:15px;color:white;}
        .notice-card:hover{transform:scale(1.02);box-shadow:0 0 15px #1cc88a,0 0 25px #4e73df;}
        .notice-card a{color:#00ffff;text-decoration:none;margin-right:10px;}
    </style>
    <script>
        function toggleForm(){
            const form=document.getElementById('noticeForm');
            form.style.display=(form.style.display==="flex")?"none":"flex";
        }
    </script>
</head>
<body>
<div class="overlay">
    <div class="top-header">{{ dept }} Department HOD Dashboard</div>

    <button class="add-btn" onclick="toggleForm()">Add Notice</button>

    <form id="noticeForm" class="notice-form" method="POST" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Notice Title">
        <textarea name="content" placeholder="Notice Content"></textarea>
        <select name="category" required>
            <option value="">Select Category</option>
            <option value="Academic">Academic</option>
            <option value="Exam">Exam</option>
            <option value="Event">Event</option>
            <option value="Circular">Circular</option>
        </select>
        <select name="priority" required>
            <option value="">Select Priority</option>
            <option value="Urgent">Urgent</option>
            <option value="Important">Important</option>
            <option value="General">General</option>
        </select>
        <input type="file" name="file" accept=".pdf,.doc,.docx,.txt">
        <button type="submit">Add Notice</button>
    </form>

    <div class="notice-board">
        {% for notice in notices %}
        <div class="notice-card">
            <h3>{{ notice['title'] }} <span style="font-size:14px;color:#ff0;">({{ notice['priority'] }})</span></h3>
            <p>{{ notice['content'] }}</p>
            <small>Category: {{ notice['category'] }}</small><br>
            {% if notice['filename'] %}
                
            {% endif %}
            <br>
            <a href="{{ url_for('edit_notice', dept=dept, notice_id=notice['id']) }}">Edit</a>
            <a href="{{ url_for('delete_notice', dept=dept, notice_id=notice['id']) }}">Delete</a>
            <a href="{{ url_for('view_notice', dept=dept, notice_id=notice['id']) }}">View</a>
        </div>
        {% else %}
        <p style="color:white;">No notices yet.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
